<script>
function openPhotoLightboxService(serviceIndex, startIdx){
  const urls = currentUser?.services?.[serviceIndex]?.photoUrls || [];
  if (!urls.length) return;
  window.__lightbox = { urls, idx: Math.max(0, Math.min(startIdx||0, urls.length-1)) };
  const img = document.getElementById('lightboxImage');
  img.src = window.__lightbox.urls[window.__lightbox.idx];
  document.getElementById('photoLightbox').style.display='block';
}

function closeLightbox(){
  document.getElementById('photoLightbox').style.display='none';
  window.__lightbox = null;
}

function prevPhoto(){
  if (!window.__lightbox) return;
  const lb = window.__lightbox;
  lb.idx = (lb.idx - 1 + lb.urls.length) % lb.urls.length;
  document.getElementById('lightboxImage').src = lb.urls[lb.idx];
}

function nextPhoto(){
  if (!window.__lightbox) return;
  const lb = window.__lightbox;
  lb.idx = (lb.idx + 1) % lb.urls.length;
  document.getElementById('lightboxImage').src = lb.urls[lb.idx];
}
</script>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
/* ===== Guard (unchanged) ===== */
(function(){
  const cu = JSON.parse(localStorage.getItem("currentUser")||"null");
  if(!cu){ window.location.href = "login.html"; }
})();

/* ===== Role helpers (kept) ===== */
function getRole(){
  const cu = JSON.parse(localStorage.getItem("currentUser")||"null");
  return cu?.role || "Viewer";
}
function isAdmin(){ return getRole()==="Admin"; }
function isTech(){ return getRole()==="Technician"; }
function isViewer(){ return getRole()==="Viewer"; }

/* ===== Users + Selected (kept) ===== */
let users = [];
let selectedUserId = null;
let currentUser = null;
let editingIndex = null;

// --- NEW: სერვერზე users-ის დამონტაჟება (უსაფრთხო, ჩუმად) ---
async function syncUsersToServer() {
  try {
    const cur = JSON.parse(localStorage.getItem('users') || '[]');
    if (Array.isArray(cur) && window.ServerStore && ServerStore.saveUsers) {
      await ServerStore.saveUsers(cur);
    }
  } catch (e) { /* silent */ }
}

// --- NEW: სერვერიდან users-ის „force refresh“ (ყოველ გახსნაზე) ---
async function refreshUsersFromServer() {
  try {
    if (window.ServerStore && ServerStore.getUsers) {
      const remote = await ServerStore.getUsers(); // ყოველთვის ვკითხულობთ

  } catch (e) {
    // ჩუმად ჩავდუმდეთ, UI იმუშავებს როგორცაა
  }

/* ===== Dates migration (kept) ===== */
function toDisplayDate(str){
  if (!str) return str;
  if (/^\d{2}\.\d{2}\.\d{4}$/.test(str)) return str;
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(str);
  if (m) { const [, y, mm, dd] = m; return `${dd}.${mm}.${y}`; }
  return str;
}
function migrateOldDatesForUser(user){
  if (!user || !Array.isArray(user.services)) return;
  let changed = false;
  user.services.forEach(s => {
    if (s && s.date) {
      const nd = toDisplayDate(s.date);
      if (nd !== s.date) { s.date = nd; changed = true; }
    }
  });
  if (changed) {
    const idx = users.findIndex(u => u.id === user.id);
    if (idx !== -1) {
  users[idx] = user;
  localStorage.setItem("users", JSON.stringify(users));
  syncUsersToServer(); // NEW
}

  }
}

function parseDDMMYYYY(str){
  const m = /^(\d{2})\.(\d{2})\.(\d{4})$/.exec(str || "");
  if (!m) return new Date(0);
  const [ , dd, mm, yyyy ] = m;
  return new Date(parseInt(yyyy,10), parseInt(mm,10)-1, parseInt(dd,10));
}

/* ===== Renderers (kept) ===== */
function renderUserInfo() {
  const infoDiv = document.getElementById("userInfo");
  if(!currentUser){ infoDiv.innerHTML="<div>მომხმარებელი ვერ მოიძებნა</div>"; return; }

  let devicesList = "არ არის მითითებული";
  if (currentUser.devices && currentUser.devices.length > 0){
    const d = currentUser.devices[0];
    if (typeof d === "object") {
      const m = d.model || "";
      const s = (d.serial || "").trim();
      devicesList = s ? `${m} | ${s}` : m;
    } else {
      devicesList = d;
    }
  }

  infoDiv.innerHTML = `
    <div><strong>ID:</strong> ${currentUser.id}</div>
    <div><strong>დასახელება:</strong> ${currentUser.name}</div>
    <div><strong>საიდენთიფიკაციო კოდი:</strong> ${currentUser.code || ""}</div>
    <div><strong>მისამართი:</strong> ${currentUser.address || ""}</div>
    <div><strong>ტელეფონი:</strong> ${currentUser.phone || ""}</div>
    <div><strong>საკონტაქტო პირი:</strong> ${currentUser.contact || ""}</div>
    <div><strong>აპარატი:</strong> ${devicesList}</div>
  `;
}

function updateUserRevenueBadge(){
  const revBox = document.getElementById("userRevenue");
  if (isTech()) { revBox.style.display = "none"; return; }

  const total = (currentUser.services || []).reduce((sum, s)=>{
    const p = parseFloat(s.price || 0);
    return sum + (isNaN(p) ? 0 : p);
  }, 0);
  document.getElementById("userRevenueValue").textContent = total.toFixed(2) + " ₾";
  revBox.style.display = "inline-block";
}

function renderServices() {
  const tbody = document.getElementById("serviceTable").tBodies[0];
  tbody.innerHTML = "";
  if(!currentUser.services) currentUser.services=[];

  const addBtn = document.getElementById("addServiceBtn");
  if (addBtn) addBtn.style.display = isViewer() ? "none" : "inline-block";

  const items = currentUser.services.map((s,i)=>({s,i}));
  items.sort((a,b)=> parseDDMMYYYY(b.s.date) - parseDDMMYYYY(a.s.date));

  items.forEach(({s, i:origIndex})=>{

// ==== LINKS (უბრალოდ ლინკები, “წაშლა” ღილაკების გარეშე) ====
let docLink = "";
if (s.docUrl) {
  docLink = `<a class="file-link" href="${s.docUrl}" target="_blank" rel="noopener noreferrer">PDF-ის ნახვა</a>`;
} else if (s.doc instanceof File) {
  docLink = `<a class="file-link" href="${URL.createObjectURL(s.doc)}" target="_blank">${s.doc.name}</a>`;
}

let photosLinks = "";
if (Array.isArray(s.photoUrls) && s.photoUrls.length) {
  photosLinks = s.photoUrls
    .map((u, i) =>
      `<a href="#" class="file-link" onclick="openPhotoLightboxService(${origIndex}, ${i}); return false;">Photo ${i+1}</a>`
    )
    .join("<br>");
} else if (Array.isArray(s.photos) && s.photos.length) {
  photosLinks = s.photos
    .map((p, i) =>
      (p instanceof File)
        ? `<a class="file-link" href="${URL.createObjectURL(p)}" target="_blank" rel="noopener noreferrer">Photo ${i+1}</a>`
        : ""
    )
    .join("<br>");
}
// ==== END LINKS ====

    let actionHtml = "";
    if (!isViewer()) {
      actionHtml = `
        <button class="btn-small btn-edit" onclick="editService(${origIndex})">რედაქტირება</button>
        <button class="btn-small btn-delete" onclick="deleteService(${origIndex})">წაშლა</button>
      `;
    }

    const row = tbody.insertRow();
    row.innerHTML = `
      <td>${s.date}</td>
      <td>${s.purpose}</td>
      <td>${docLink}</td>
      <td>${photosLinks}</td>
      <td>${s.price}</td>
      <td>${s.technician || "-"}</td>
      <td>${actionHtml}</td>`;
  });

  document.getElementById("serviceCount").innerText=currentUser.services.length;
  updateUserRevenueBadge();
  filterTable();
}

function openServiceForm() {

  document.getElementById("servicePhotos").value="";

  document.getElementById("serviceTechnician").selectedIndex=0;
  document.getElementById("serviceModal").style.display="block";
}
function closeServiceForm(){ document.getElementById("serviceModal").style.display="none"; }

async function saveService() {
  if (isViewer()) { alert("დაშვება მხოლოდ Admin/Technician როლებისთვის."); return; }

  const btn = document.getElementById('saveServiceBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'შენახვა...'; }

  try {
    const date       = document.getElementById("serviceDate").value;
    const purpose    = document.getElementById("servicePurposeSelect").value;
    const docFile    = document.getElementById("serviceDoc").files[0];
    const photoFiles = Array.from(document.getElementById("servicePhotos").files);
    const price      = document.getElementById("servicePrice").value;
    const technician = document.getElementById("serviceTechnician").value;

    if (!date || !purpose || !price) {
      alert("ყველა სავალდებულო ველი შეავსეთ!");
      return;
    }

   // ---- 1) ფაილების ატვირთვა (უსაფრთხო) ----
let docUrl = "";
let photoUrls = [];
const isHttpUrl = (u) => typeof u === "string" && /^https?:\/\//i.test(u);

if (docFile) {
  try {
    if (!window.ServerStore?.uploadFile) throw new Error('uploadFile undef');
    const u = await ServerStore.uploadFile(docFile);
    if (isHttpUrl(u)) docUrl = u; else throw new Error('bad url');
  } catch (e) {
    console.warn('PDF upload failed:', e);
    // არაფერს ვშლით — ადგილობრივ File-ად დავტოვოთ
  }
}

if (photoFiles.length) {
  if (!window.ServerStore?.uploadFile) {
    console.warn('uploadFile undefined, skipping photos');
  } else {
    for (const pf of photoFiles) {
      try {
        const u = await ServerStore.uploadFile(pf);
        if (isHttpUrl(u)) photoUrls.push(u);
      } catch (e) {
        console.warn('Photo upload failed for', pf?.name, e);
      }
    }
  }
}

// ---- 2) ჩავწეროთ ჩანაწერი (URL თუ არის → ვწერთ; თუ არა → File დავტოვოთ, რომ ამ სესიაში იმუშაოს) ----
if (editingIndex !== null) {
  const s = currentUser.services[editingIndex];
  s.date = date;
  s.purpose = purpose;
  s.price = price;
  s.technician = technician;

  if (docUrl) { s.docUrl = docUrl; delete s.doc; }
  else if (docFile) { s.doc = docFile; }

  if (photoUrls.length) { s.photoUrls = photoUrls; delete s.photos; }
  else if (photoFiles.length) { s.photos = photoFiles; }

} else {
  const newService = { date, purpose, price, technician };
  if (docUrl) newService.docUrl = docUrl;
  else if (docFile) newService.doc = docFile;

  if (photoUrls.length) newService.photoUrls = photoUrls;
  else if (photoFiles.length) newService.photos = photoFiles;

  currentUser.services.push(newService);
}

    // ---- 3) users -> localStorage -> სერვერზე push ----
    const idx = users.findIndex(u => u.id === currentUser.id);
    if (idx !== -1) users[idx] = currentUser;

    localStorage.setItem("users", JSON.stringify(users));
    await syncUsersToServer();   // დაველოდოთ სერვერზე ჩაწერას

    // სურვილისამებრ: ჩუმად განვაახლოთ users სერვერიდან, რომ incognito-სთან იყო თანხვედრა
    if (window.ServerStore?.getUsers) {
      try {
        const fresh = await ServerStore.getUsers();
        if (Array.isArray(fresh) && fresh.length) {
          localStorage.setItem('users', JSON.stringify(fresh));
          // ახლიდან წამოვიკითხოთ currentUser ახალ users-დან
          const uid = currentUser.id;
          users = fresh;
          currentUser = users.find(u => u.id === uid) || currentUser;
        }
      } catch (e) { /* ჩუმად */ }
    }

    renderServices();
    closeServiceForm();
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'შენახვა'; }
  }
}

async function deleteService(idx){
  if (isViewer()) { alert("დაშვება მხოლოდ Admin/Technician როლებისთვის."); return; }

  const s = currentUser.services[idx];
  if (!s) return;

  if(!confirm("დარწმუნებული ხარ? ჩანაწერი და მასზე მიმაგრებული ყველა ფაილი (PDF/ფოტო) წაიშლება სერვერიდანაც.")){
    return;
  }

  // 1) მოვაგროვოთ server-ზე შესაშლელი key-ები (მხოლოდ URL-ებიდან; File ობიექტები სერვერზე არაა ატვირთული)
  const keys = [];
  const kDoc = s.docUrl ? extractKeyFromWorkerUrl(s.docUrl) : null;
  if (kDoc) keys.push(kDoc);

  if (Array.isArray(s.photoUrls)) {
    s.photoUrls.forEach(u => {
      const k = extractKeyFromWorkerUrl(u);
      if (k) keys.push(k);
    });
  }

  // 2) ვცადოთ server-სide წაშლა (თუ რამე ვერ გაისტარტა, ლოკალურად მაინც გავაგრძელებთ)
  try {
    if (keys.length) {
      if (window.ServerStore?.deleteFiles) {
        await ServerStore.deleteFiles(keys);
      } else {
        await fetch('https://restless-lab-c6ef.n-gogolashvili.workers.dev/delete-file', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ keys })
        });
      }
    }
  } catch (e) {
    console.warn('server delete failed:', e); // არ ვაჩერებთ პროცესს
  }

  // 3) ამოვშალოთ ჩანაწერი ლოკალური users-დან და დავასინქრონოთ
  currentUser.services.splice(idx, 1);
  const idxU = users.findIndex(u => u.id === currentUser.id);
  if (idxU !== -1) { users[idxU] = currentUser; }

  localStorage.setItem("users", JSON.stringify(users));
  await syncUsersToServer();

  // 4) UI refresh
  renderServices();
}


function editService(idx){
  if (isViewer()) { alert("დაშვება მხოლოდ Admin/Technician როლებისთვის."); return; }
  const s=currentUser.services[idx];
  editingIndex=idx;
  document.getElementById("modalTitle").innerText="სერვისის რედაქტირება";
  document.getElementById("serviceDate").value=s.date;
  document.getElementById("servicePurposeSelect").value=s.purpose;
  document.getElementById("servicePrice").value=s.price;
  document.getElementById("serviceTechnician").value=s.technician || "ნიკო";
  document.getElementById("serviceModal").style.display="block";
}

// worker-ის /f/<key> ბმულიდან key-ის ამოღება (სუფთა JS, script ტეგები არ სჭირდება)
function extractKeyFromWorkerUrl(urlStr){
  try {
    const u = new URL(urlStr);
    if (u.pathname.startsWith('/f/')) return decodeURIComponent(u.pathname.slice(3));
    return null;
  } catch { return null; }
}

/* ===== Filters (kept) ===== */
function filterTable(){
  const purposeVal=(document.getElementById("filterPurpose").value||"").toLowerCase();
  const techVal=(document.getElementById("filterTechnician").value||"").toLowerCase();
  const trs=document.getElementById("serviceTable").tBodies[0].rows;
  Array.from(trs).forEach(tr=>{
    const purposeText=tr.cells[1].innerText.toLowerCase();
    const techText=tr.cells[5].innerText.toLowerCase();
    const passPurpose = purposeVal ? purposeText.includes(purposeVal) : true;
    const passTech    = techVal ? techText.includes(techVal) : true;
    tr.style.display = (passPurpose && passTech) ? "" : "none";
  });
}

/* ===== Navigation (kept goBack; added logout + role-based menu) ===== */
function goBack(){ window.location.href="main.html"; }

function logout(){
  const cu = JSON.parse(localStorage.getItem("currentUser"));
  if(cu){
    const logs=JSON.parse(localStorage.getItem("appLogs")||"[]");
    logs.unshift({ user:cu.username, action:"Logout", time:new Date().toLocaleString("ka-GE") });
    localStorage.setItem("appLogs",JSON.stringify(logs));
  }
  localStorage.removeItem("currentUser");
  window.location.href="login.html";
}

function updateSidebarByRole(){
  const statsLink = document.getElementById("statsLink");
  const settingsLink = document.getElementById("settingsLink");
  const profileLink = document.getElementById("profileLink");

  if (isTech()) {
    if (statsLink) statsLink.style.display = "none";
    if (settingsLink) settingsLink.style.display = "none";
    if (profileLink) profileLink.style.display = "block";
  } else if (isViewer()) {
    if (statsLink) statsLink.style.display = "block";
    if (settingsLink) settingsLink.style.display = "none";
    if (profileLink) profileLink.style.display = "block";
  } else if (isAdmin()) {
    if (statsLink) statsLink.style.display = "block";
    if (settingsLink) settingsLink.style.display = "block";
    if (profileLink) profileLink.style.display = "none";
  }
}
updateSidebarByRole();

flatpickr("#serviceDate", { dateFormat: "d.m.Y", allowInput: true, clickOpens: true });

// --- NEW: პირველად გახსნისას ჯერ სერვერიდან ჩამოტანა, მერე რენდერი ---
(async function initUserPage(){
  try {
        // 1) ყოველთვის სცადე სერვერიდან ახალი users ჩამოტანა (არ აქვს მნიშვნელობა localStorage ცარიელია თუ არა)
    await refreshUsersFromServer();

    // 2) თუ რატომღაც სერვერი ვერ წავიკითხეთ და localStorage ცარიელია — fallback ერთი ჯერზე
    if (typeof window.bootstrapFromServerIfEmpty === 'function') {
      await window.bootstrapFromServerIfEmpty();
    }

    // 3) ახლა წავიკითხოთ users და ავირჩიოთ მიმდინარე
    users = JSON.parse(localStorage.getItem('users') || '[]');
    selectedUserId = localStorage.getItem('selectedUser');
    currentUser = users.find(u => u.id === selectedUserId) || null;

    if (!currentUser) {
      window.location.href = "main.html";
      return;
    }

    if (!currentUser.services) currentUser.services = [];

    // 4) დახატე
    renderUserInfo();
    renderServices();
  } catch(e) {
    console.warn('initUserPage error:', e);
    if (!currentUser) window.location.href = "main.html";
  }
})();
