<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>მომხმარებლის გვერდი</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<style>
/* ===== Base ===== */
body {
  margin:0; padding:0;
  font-family:"Myriad Pro","Segoe UI",Arial,sans-serif;
  display:flex;
  background:#f4f6f9; color:#282828;
}

/* ===== Sidebar (same as main) ===== */
.sidebar {
  width:200px;
  background:#282828;
  color:#fff;
  min-height:100vh;
  display:flex; flex-direction:column;
}
.sidebar .brand {
  display:flex; align-items:center; gap:10px;
  padding:14px 16px; border-bottom:1px solid rgba(255,255,255,.1);
}
.sidebar .brand img{ width:40px; height:40px; object-fit:cover; border-radius:8px; }
.sidebar .brand .t1{ font-weight:700; }
.sidebar .brand .t2{ opacity:.8; font-size:12px; }
.sidebar a {
  color:#fff; text-decoration:none; padding:12px 16px; display:block;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.sidebar a:hover{ background:rgba(255,255,255,.08); }
.sidebar .spacer{ flex:1; }
.sidebar .logout{ background:#111; }

/* ===== Main header ===== */
header {
  background:#fff; border-bottom:1px solid #eee; padding:12px 16px;
  display:flex; align-items:center; justify-content:space-between; gap:10px; width:100%;
}
header .left{ display:flex; align-items:center; gap:10px; }
header .title{ font-weight:700; }

/* ===== Content ===== */
.container { width:95%; max-width:980px; margin:24px auto; display:flex; flex-direction:column; gap:16px; }
.card { background:#fff; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1); padding:16px; }
.card h2 { margin:0 0 12px 0; font-size:18px; color:#282828; }

.user-info { display:grid; grid-template-columns:1fr 1fr; gap:10px; background:#fafafa; padding:12px; border:1px solid #eee; border-radius:10px; }
.user-info .row{ display:flex; gap:8px; }
.user-info .key{ width:120px; color:#555; font-weight:600; }
.user-info .val{ color:#222; }

.badge-wrap{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
.revenue-badge{ background:#111;color:#fff; border-radius:12px; padding:8px 12px; font-size:14px; }
.revenue-badge strong{ font-weight:700; }

/* ===== Actions & table ===== */
.actions { display:flex; gap:10px; margin-top:6px; }
.actions button { background:#282828; color:#fff; border:none; border-radius:10px; padding:8px 10px; cursor:pointer; }
.actions button:hover{ background:#1f1f1f; }

.table-wrap{ overflow:auto; border:1px solid #eee; border-radius:10px; }
table{ border-collapse:collapse; width:100%; background:#fff; }
th, td{ border-bottom:1px solid #eee; padding:10px 12px; text-align:left; }
tr:hover{ background:#fafafa; }

/* ===== Filters ===== */
.filters { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px; }
.filters select, .filters input { width:100%; padding:8px 10px; border:1px solid #ddd; border-radius:10px; }

/* ===== Modal ===== */
.modal { display:none; position:fixed; z-index:999; inset:0; background:rgba(0,0,0,0.45); }
.modal .modal-content {
  width:min(560px, 94vw); background:#fff; margin:5% auto; padding:20px 16px; border-radius:12px;
  position:relative; box-shadow:0 20px 50px rgba(0,0,0,0.3);
}
.modal .modal-content h3 { text-align:center; margin-top:0; color:#282828; }
.modal .modal-content label { display:block; margin-top:12px; font-weight:600; color:#333; }
.modal .modal-content input, .modal .modal-content select { width:100%; padding:10px; border:1px solid #ccc; border-radius:8px; color:#282828; box-sizing:border-box; }
.modal .modal-content button { margin-top:16px; width:100%; padding:12px; background:#282828; color:white; border:none; border-radius:8px; cursor:pointer; }
.modal .modal-content button:hover { background:#1f1f1f; }
.close { position:absolute; right:14px; top:10px; font-size:22px; font-weight:bold; color:#333; cursor:pointer; }

/* ===== Lightbox ===== */
#photoLightbox { display:none; position:fixed; z-index:1000; inset:0; background:rgba(0,0,0,0.8); }
#photoLightbox img { max-width:90%; max-height:80%; display:block; margin:50px auto; }
#photoLightbox button { margin:0 auto; display:block; background:#fff; border:none; border-radius:8px; padding:8px 12px; cursor:pointer; }
</style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="brand">
    <img src="SANSO.jpg" alt="Sanso">
    <div>
      <div class="t1">Sanso Technical</div>
      <div class="t2">Service Portal</div>
    </div>
  </div>
  <a href="main.html">მთავარი</a>
  <a id="statsLink" href="stats.html">სტატისტიკა</a>
  <a id="settingsLink" href="settings.html">პარამეტრები</a>
  <a id="profileLink" href="profile.html" style="display:none">პროფილი</a>
  <div class="spacer"></div>
  <a class="logout" href="javascript:void(0)" onclick="logout()">გასვლა</a>
</nav>

<!-- Main -->
<div style="flex:1; display:flex; flex-direction:column;">
  <header>
    <div class="left">
      <button class="actions" onclick="goBack()" style="background:#eee;color:#111;border-radius:10px;padding:6px 10px;border:1px solid #ddd">← უკან</button>
      <div class="title">მომხმარებლის გვერდი</div>
    </div>
  </header>

  <div class="container">
    <!-- User info -->
    <div class="card">
      <h2>კლიენტის ინფორმაცია</h2>
      <div class="user-info" id="userInfo"></div>
    </div>

    <!-- Summary & Add button -->
    <div class="card">
      <div class="badge-wrap">
        <h2 style="margin:0;">ტექნიკური ვიზიტები (<span id="serviceCount">0</span>)</h2>
        <div id="userRevenue" class="revenue-badge">ჯამური შემოსავალი: <strong><span id="userRevenueValue">0.00 ₾</span></strong></div>
      </div>

      <div class="actions" style="margin-top:8px;">
        <button id="addServiceBtn" onclick="openServiceForm()">+ ტექნიკური სერვისის დამატება</button>
      </div>

      <div class="filters">
        <select id="filterPurpose" onchange="renderServices()">
          <option value="">ყველა დანიშნულება</option>
          <option>წმენდა</option>
          <option>გამოძახება</option>
          <option>ფილტრები</option>
          <option>თავაკის შეკეთება</option>
        </select>
        <input id="filterTechnician" type="text" placeholder="ტექნიკოსი... (არასავალდებულო)" oninput="renderServices()">
      </div>

      <div class="table-wrap" style="margin-top:8px;">
        <table id="serviceTable">
          <thead>
            <tr>
              <th>თარიღი</th>
              <th>დანიშნულება</th>
              <th>დოკუმენტი</th>
              <th>ფოტო</th>
              <th>ფასი</th>
              <th>ტექნიკოსი</th>
              <th>ქმედება</th>
            </tr>
          </thead>
          <tbody id="serviceTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- ===== Add/Edit Service Modal ===== -->
<div id="serviceModal" class="modal" aria-hidden="true">
  <div class="modal-content">
    <span class="close" onclick="closeServiceForm()">&times;</span>
    <h3 id="modalTitle">ტექნიკური სერვისი</h3>

    <label>თარიღი:</label>
    <input type="text" id="serviceDate">

    <label>დანიშნულება:</label>
    <select id="servicePurposeSelect">
      <option>წმენდა</option>
      <option>გამოძახება</option>
      <option>ფილტრები</option>
      <option>თავაკის შეკეთება</option>
    </select>

    <label>დოკუმენტი (ნომერი ან ტექსტი):</label>
    <input type="text" id="serviceDoc" placeholder="მაგ: INV-00123">

    <label>ფოტო (URL ან აღწერა):</label>
    <input type="text" id="servicePhotos" placeholder="მაგ: https://...">

    <label>ფასი (₾):</label>
    <input type="text" id="servicePrice" placeholder="მაგ: 50">

    <label>ტექნიკოსი:</label>
    <input type="text" id="serviceTechnician" placeholder="მაგ: ნიკო">

    <button onclick="saveService()">შენახვა</button>
  </div>
</div>

<!-- ===== Lightbox ===== -->
<div id="photoLightbox">
  <img id="lightboxImage" alt="სურათი">
  <button onclick="closeLightbox()">დახურვა</button>
</div>

<!-- Libs -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<!-- Server-backed data store -->
<script src="/js/data-store.js"></script>

<!-- Page logic (NO localStorage; server only) -->
<script>
/* ===== Role & Guard ===== */
function getCurrentUser(){ return DataStore.getCurrentUser(); }
function getRole(){ return getCurrentUser()?.role || "Viewer"; }
function isAdmin(){ return getRole()==="Admin"; }
function isTech(){ return getRole()==="Technician"; }
function isViewer(){ return getRole()==="Viewer"; }

function goBack(){ window.location.href = "main.html"; }

async function logout(){
  const cu = DataStore.getCurrentUser();
  if (cu) {
    const logs = await DataStore.getLogs();
    logs.unshift({ user:cu.username, action:"Logout", time:new Date().toLocaleString("ka-GE") });
    await DataStore.saveLogs(logs);
  }
  DataStore.clearCurrentUser();
  window.location.href = "login.html";
}

/* ===== State ===== */
let users = [];
let currentUser = null;
let services = []; // currentUser.services
let editIndex = -1;

(async function init(){
  await DataStore.init();

  const cu = DataStore.getCurrentUser();
  if(!cu){ window.location.href="login.html"; return; }

  // sidebar role
  const settingsLink = document.getElementById("settingsLink");
  const profileLink  = document.getElementById("profileLink");
  if (settingsLink && profileLink){
    if (isAdmin()){ settingsLink.style.display="block"; profileLink.style.display="none"; }
    else { settingsLink.style.display="none"; profileLink.style.display="block"; }
  }

  // pick selected user from session
  const selectedId = DataStore.getSelectedUser();
  if(!selectedId){ window.location.href = "main.html"; return; }

  users = await DataStore.getUsers();
  currentUser = users.find(u => String(u.id) === String(selectedId)) || null;
  if(!currentUser){ window.location.href = "main.html"; return; }

  if (!Array.isArray(currentUser.services)) currentUser.services = [];
  services = currentUser.services;

  // date picker
  flatpickr("#serviceDate", { dateFormat: "Y-m-d" });

  renderUserInfo();
  renderServices();
})();

/* ===== Renderers ===== */
function renderUserInfo(){
  const info = document.getElementById("userInfo");
  const u = currentUser || {};
  const device = (u.devices && u.devices[0]) ? `${u.devices[0].model||""} ${u.devices[0].serial?("• "+u.devices[0].serial):""}` : "";
  info.innerHTML = `
    <div class="row"><div class="key">ID</div><div class="val">${u.id||""}</div></div>
    <div class="row"><div class="key">დასახელება</div><div class="val">${u.name||""}</div></div>
    <div class="row"><div class="key">კოდი</div><div class="val">${u.code||""}</div></div>
    <div class="row"><div class="key">მისამართი</div><div class="val">${u.address||""}</div></div>
    <div class="row"><div class="key">ტელეფონი</div><div class="val">${u.phone||""}</div></div>
    <div class="row"><div class="key">კონტაქტი</div><div class="val">${u.contact||""}</div></div>
    <div class="row"><div class="key">მოწყობილობა</div><div class="val">${device}</div></div>
  `;
}

function renderServices(){
  const tbody = document.getElementById("serviceTableBody");
  if (!tbody) return;
  tbody.innerHTML = "";

  // filters
  const fp = (document.getElementById("filterPurpose")?.value || "").trim();
  const ft = (document.getElementById("filterTechnician")?.value || "").trim().toLowerCase();

  let count = 0;
  let revenue = 0;

  services
    .filter(s => {
      const okPurpose = fp ? (String(s.purpose||"") === fp) : true;
      const okTech = ft ? String(s.technician||"").toLowerCase().includes(ft) : true;
      return okPurpose && okTech;
    })
    .forEach((s, idx) => {
      count++;
      const price = Number(s.price || 0);
      if (!isNaN(price)) revenue += price;

      const tr = document.createElement("tr");
      const hasPhoto = !!(s.photos && String(s.photos).trim());

      tr.innerHTML = `
        <td>${s.date || ""}</td>
        <td>${s.purpose || ""}</td>
        <td>${s.doc || ""}</td>
        <td>${hasPhoto ? `<a href="javascript:void(0)" onclick="openLightbox('${escapeHtml(s.photos)}')">ნახვა</a>`:"—"}</td>
        <td>${isNaN(price) ? "" : (price.toFixed(2)+" ₾")}</td>
        <td>${s.technician || ""}</td>
        <td>
          ${isViewer() ? "" : `
          <button class="btn-small" style="background:#0ea5e9;color:#fff;border:none;border-radius:8px;padding:6px 10px" onclick="openServiceForm(${idx})">რედაქტირება</button>
          <button class="btn-small" style="background:#ef4444;color:#fff;border:none;border-radius:8px;padding:6px 10px" onclick="deleteService(${idx})">წაშლა</button>`}
        </td>
      `;
      tbody.appendChild(tr);
    });

  document.getElementById("serviceCount").textContent = String(count);
  document.getElementById("userRevenueValue").textContent = revenue.toFixed(2) + " ₾";
}

/* ===== Lightbox ===== */
function openLightbox(src){
  const lb = document.getElementById("photoLightbox");
  const img = document.getElementById("lightboxImage");
  if (!lb || !img) return;
  img.src = src;
  lb.style.display = "block";
}
function closeLightbox(){
  const lb = document.getElementById("photoLightbox");
  if (lb) lb.style.display = "none";
}

/* ===== Helpers ===== */
function escapeHtml(s){
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ===== Modal open/close ===== */
function openServiceForm(index=-1){
  if (isViewer()) return alert("დაშვება მხოლოდ Admin/Technician როლებისთვის.");
  editIndex = index;

  const m = document.getElementById("serviceModal");
  const title = document.getElementById("modalTitle");
  const d = document.getElementById("serviceDate");
  const p = document.getElementById("servicePurposeSelect");
  const doc = document.getElementById("serviceDoc");
  const ph = document.getElementById("servicePhotos");
  const pr = document.getElementById("servicePrice");
  const t = document.getElementById("serviceTechnician");

  if (index >= 0) {
    const s = services[index];
    title.textContent = "სერვისის რედაქტირება";
    d.value = s.date || "";
    p.value = s.purpose || "წმენდა";
    doc.value = s.doc || "";
    ph.value = s.photos || "";
    pr.value = s.price || "";
    t.value = s.technician || "";
  } else {
    title.textContent = "სერვისის დამატება";
    d.value = new Date().toISOString().slice(0,10);
    p.value = "წმენდა";
    doc.value = "";
    ph.value = "";
    pr.value = "";
    t.value = "";
  }
  if (m) m.style.display = "block";
}
function closeServiceForm(){
  const m = document.getElementById("serviceModal");
  if (m) m.style.display = "none";
}

/* ===== Save/Delete service (SERVER) ===== */
async function saveService(){
  if (isViewer()) return alert("დაშვება მხოლოდ Admin/Technician როლებისთვის.");
  const d = document.getElementById("serviceDate")?.value || "";
  const p = document.getElementById("servicePurposeSelect")?.value || "";
  const doc = document.getElementById("serviceDoc")?.value || "";
  const ph = document.getElementById("servicePhotos")?.value || "";
  const pr = Number(document.getElementById("servicePrice")?.value || 0);
  const t = document.getElementById("serviceTechnician")?.value || "";

  const svc = { date:d, purpose:p, doc, photos:ph, price:isNaN(pr)?0:pr, technician:t };

  if (editIndex >= 0) services[editIndex] = svc;
  else services.unshift(svc);

  // persist user
  currentUser.services = services;
  await DataStore.upsertUser(currentUser);

  // refresh from server for consistency
  const refreshed = await DataStore.getUsers();
  const id = String(currentUser.id);
  currentUser = refreshed.find(u => String(u.id) === id) || currentUser;
  services = Array.isArray(currentUser.services) ? currentUser.services : [];

  renderServices();
  closeServiceForm();
}

async function deleteService(index){
  if (isViewer()) return alert("დაშვება მხოლოდ Admin/Technician როლებისთვის.");
  if (!confirm("წავშალოთ სერვისი?")) return;
  services.splice(index, 1);
  currentUser.services = services;
  await DataStore.upsertUser(currentUser);

  const refreshed = await DataStore.getUsers();
  const id = String(currentUser.id);
  currentUser = refreshed.find(u => String(u.id) === id) || currentUser;
  services = Array.isArray(currentUser.services) ? currentUser.services : [];
  renderServices();
}
</script>

</body>
</html>
