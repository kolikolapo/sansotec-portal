<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>პარამეტრები — მომხმარებლების მართვა</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  margin:0; padding:0;
  font-family:"Myriad Pro","Segoe UI",Arial,sans-serif;
  display:flex;
  background:#f4f6f9; color:#282828;
}
/* Sidebar */
.sidebar {
  width:200px;
  background:#282828;
  color:#fff;
  min-height:100vh;
  display:flex; flex-direction:column;
}
.sidebar .brand {
  display:flex; align-items:center; gap:10px;
  padding:14px 16px; border-bottom:1px solid rgba(255,255,255,.1);
}
.sidebar .brand img{ width:40px; height:40px; object-fit:cover; border-radius:8px; }
.sidebar .brand .t1{ font-weight:700; }
.sidebar .brand .t2{ opacity:.8; font-size:12px; }
.sidebar a {
  color:#fff; text-decoration:none; padding:12px 16px; display:block;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.sidebar a:hover{ background:rgba(255,255,255,.08); }
.sidebar .spacer{ flex:1; }
.sidebar .logout{ background:#111; }

/* Main */
.main {
  flex:1; display:flex; flex-direction:column; gap:14px;
}
header {
  background:#fff; border-bottom:1px solid #eee; padding:12px 16px;
  display:flex; align-items:center; justify-content:space-between;
}
header .left{ display:flex; align-items:center; gap:10px; }
header .title{ font-weight:700; }
.btn{ background:#282828; color:#fff; border:none; padding:8px 12px; border-radius:10px; cursor:pointer; }
.btn:hover{ background:#1f1f1f; }
.btn-small{ padding:6px 10px; border-radius:8px; border:none; cursor:pointer; }
.btn-edit{ background:#0ea5e9; color:#fff; }
.btn-delete{ background:#ef4444; color:#fff; }

/* Content */
.container{ padding:16px; display:grid; gap:16px; grid-template-columns: 1fr; }
.card{ background:#fff; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
.card-head{ padding:12px 16px; background:#282828; color:#fff; display:flex; align-items:center; justify-content:space-between; }
.card-body{ padding:16px; }

.table-wrap{ overflow:auto; border:1px solid #eee; border-radius:10px; }
table{ border-collapse:collapse; width:100%; background:#fff; }
th, td{ border-bottom:1px solid #eee; padding:10px 12px; text-align:left; }
tr:hover{ background:#fafafa; }

/* Modal */
.modal {
  position:fixed; inset:0; background:rgba(0,0,0,.45); display:none;
  align-items:center; justify-content:center; padding:16px;
}
.modal .dialog{
  width:min(560px, 94vw); background:#fff; border-radius:14px;
  box-shadow:0 20px 50px rgba(0,0,0,.3); overflow:hidden;
}
.modal .dialog header{ display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid #eee; }
.modal .dialog .body{ padding:16px; display:grid; gap:12px; }
.modal .dialog label{ font-size:13px; color:#444; display:block; }
.modal .dialog input, .modal .dialog select{
  width:100%; border:1px solid #ddd; border-radius:10px; padding:8px 10px; outline:none;
}
.modal .dialog footer{ display:flex; gap:8px; justify-content:flex-end; padding:12px 16px; border-top:1px solid #eee; }
</style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="brand">
    <img src="SANSO.jpg" alt="Sanso">
    <div>
      <div class="t1">Sanso Technical</div>
      <div class="t2">Service Portal</div>
    </div>
  </div>
  <a href="main.html">მთავარი</a>
  <a id="settingsLink" href="settings.html">პარამეტრები</a>
  <a id="profileLink" href="profile.html" style="display:none">პროფილი</a>
  <div class="spacer"></div>
  <a class="logout" href="javascript:void(0)" onclick="logout()">გასვლა</a>
</nav>

<!-- Main -->
<div class="main">
  <header>
    <div class="left">
      <div class="title">პარამეტრები — მომხმარებლების მართვა</div>
    </div>
    <div>
      <button class="btn" onclick="openModal()">+ ახალი მომხმარებელი</button>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <div class="card-head">
        <div>სისტემის მომხმარებლები (appUsers)</div>
      </div>
      <div class="card-body">
        <div class="table-wrap">
          <table id="appUsersTable">
            <thead>
              <tr>
                <th>მომხმარებელი</th>
                <th>სახელი და გვარი</th>
                <th>როლი</th>
                <th>პაროლი</th>
                <th>ქმედება</th>
              </tr>
            </thead>
            <tbody id="appUsersTbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="appUserModal" class="modal">
  <div class="dialog">
    <header>
      <div id="modalTitle">მომხმარებლის დამატება</div>
      <button class="btn-small" onclick="closeModal()">×</button>
    </header>
    <div class="body">
      <div>
        <label>მომხმარებელი</label>
        <input id="au_username" type="text" placeholder="username">
      </div>
      <div>
        <label>სახელი და გვარი</label>
        <input id="au_fullName" type="text" placeholder="სახელი გვარი">
      </div>
      <div>
        <label>როლი</label>
        <select id="au_role">
          <option value="Admin">Admin</option>
          <option value="Technician">Technician</option>
          <option value="Viewer">Viewer</option>
        </select>
      </div>
      <div>
        <label>პაროლი</label>
        <input id="au_password" type="text" placeholder="პაროლი">
      </div>
    </div>
    <footer>
      <button class="btn-small" onclick="closeModal()">დახურვა</button>
      <button class="btn-small btn-edit" onclick="saveAppUser()">შენახვა</button>
    </footer>
  </div>
</div>

<!-- Data Store -->
<script src="/js/data-store.js"></script>

<!-- Page Logic (server-backed) -->
<script>
function getCurrentUser(){ return DataStore.getCurrentUser(); }
function getRole(){ return getCurrentUser()?.role || "Viewer"; }
function isAdmin(){ return getRole()==="Admin"; }

let appUsers = [];
let editingIndex = -1;

(async function init(){
  await DataStore.init();
  const cu = DataStore.getCurrentUser();

  // მხოლოდ Admin-ს შევუშვათ
  if(!cu || !isAdmin()){
    window.location.href = "main.html";
    return;
  }

  // Sidebar visibility
  const settingsLink = document.getElementById("settingsLink");
  const profileLink = document.getElementById("profileLink");
  if (settingsLink && profileLink){
    settingsLink.style.display = "block";  // Admin
    profileLink.style.display = "none";
  }

  appUsers = await DataStore.getAppUsers();
  renderAppUsers();
})();

function renderAppUsers(){
  const tb = document.getElementById("appUsersTbody");
  if(!tb) return;
  tb.innerHTML = "";

  appUsers.forEach((u, idx) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${escapeHtml(u.username||"")}</td>
      <td>${escapeHtml(u.fullName||"")}</td>
      <td>${escapeHtml(u.role||"")}</td>
      <td>${escapeHtml(u.password||"")}</td>
      <td>
        <button class="btn-small btn-edit" onclick="editAppUser(${idx})">რედაქტირება</button>
        <button class="btn-small btn-delete" onclick="deleteAppUser(${idx})">წაშლა</button>
      </td>
    `;
    tb.appendChild(tr);
  });
}

function escapeHtml(s){
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ===== Modal ===== */
function openModal(){
  editingIndex = -1;
  document.getElementById("modalTitle").textContent = "მომხმარებლის დამატება";
  document.getElementById("au_username").value = "";
  document.getElementById("au_fullName").value = "";
  document.getElementById("au_role").value = "Viewer";
  document.getElementById("au_password").value = "";
  document.getElementById("appUserModal").style.display = "flex";
}
function closeModal(){
  document.getElementById("appUserModal").style.display = "none";
}

function editAppUser(idx){
  editingIndex = idx;
  const u = appUsers[idx];
  document.getElementById("modalTitle").textContent = "მომხმარებლის რედაქტირება";
  document.getElementById("au_username").value = u.username || "";
  document.getElementById("au_fullName").value = u.fullName || "";
  document.getElementById("au_role").value = u.role || "Viewer";
  document.getElementById("au_password").value = u.password || "";
  document.getElementById("appUserModal").style.display = "flex";
}

async function saveAppUser(){
  const obj = {
    username: document.getElementById("au_username").value.trim(),
    fullName: document.getElementById("au_fullName").value.trim(),
    role:     document.getElementById("au_role").value,
    password: document.getElementById("au_password").value
  };
  if (!obj.username || !obj.password){
    alert("მომხმარებელი და პაროლი სავალდებულოა");
    return;
  }

  if (editingIndex >= 0) appUsers[editingIndex] = obj;
  else appUsers.push(obj);

  await DataStore.saveAppUsers(appUsers);
  appUsers = await DataStore.getAppUsers();
  renderAppUsers();
  closeModal();
}

async function deleteAppUser(idx){
  if (!confirm("წავშალოთ?")) return;
  appUsers.splice(idx,1);
  await DataStore.saveAppUsers(appUsers);
  appUsers = await DataStore.getAppUsers();
  renderAppUsers();
}

/* ===== Logout ===== */
async function logout(){
  const cu = DataStore.getCurrentUser();
  if (cu) {
    const logs = await DataStore.getLogs();
    logs.unshift({ user:cu.username, action:"Logout", time:new Date().toLocaleString("ka-GE") });
    await DataStore.saveLogs(logs);
  }
  DataStore.clearCurrentUser();
  window.location.href = "login.html";
}
</script>

</body>
</html>
