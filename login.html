<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>შესვლა — Sanso Technical Department</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
  --bg:#f4f6f9;
  --surface:#ffffff;
  --ink:#282828;
  --primary:#282828;
  --primary-700:#1f1f1f;
  --ring: rgba(40,40,40,.18);
  --r:16px;
  --shadow-lg: 0 18px 40px rgba(15,23,42,.12);
  --shadow-sm: 0 1px 2px rgba(15,23,42,.06);
}

*{box-sizing:border-box}
html,body{height:100%; margin:0; padding:0; color:var(--ink); font:16px/1.45 system-ui, -apple-system, Segoe UI, Roboto, Arial, Helvetica, "Apple Color Emoji", "Segoe UI Emoji"; background:var(--bg)}
a{color:inherit; text-decoration:none}
button{cursor:pointer}

/* Header */
.header{
  position:sticky; top:0; z-index:10;
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px; background:var(--surface); border-bottom:1px solid #eaeaea;
}
.header .brand{display:flex; align-items:center; gap:10px}
.header .brand img{width:42px; height:42px; border-radius:12px; object-fit:cover; box-shadow:var(--shadow-sm)}
.header .brand .t1{font-weight:700}
.header .brand .t2{color:#666; font-size:13px}

/* ===== Main area to center the card ===== */
.main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:30px 10px;
}

/* Card */
.card{
  width:min(440px, 92vw);
  background:var(--surface);
  border-radius:var(--r);
  box-shadow:var(--shadow-lg);
  border:1px solid #eee;
}
.card-head{
  padding:22px 24px 0;
  display:flex; align-items:center; gap:12px; justify-content:center; flex-wrap:wrap;
}
.card-head img{width:58px; height:58px; border-radius:14px; object-fit:cover; box-shadow:var(--shadow-sm)}
.card-head h1{font-size:20px; margin:10px 0 2px 0}
.card-head p{margin:0 0 10px 0; color:#666; font-size:13.5px}

.card-body{ padding:14px 24px 24px; }
.form-row{display:flex; flex-direction:column; gap:8px; margin:10px 0 14px}
.label{font-size:13px; color:#555}
.input{
  display:flex; align-items:center; gap:10px;
  border:1px solid #ddd; border-radius:12px; background:#fafafa;
  padding:10px 12px;
}
.input input{
  border:none; outline:none; background:transparent; width:100%;
  font-size:15px; padding:2px;
}
.input .suffix-btn{
  border:none; background:#efefef; border-radius:8px; padding:6px 10px; font-size:13px;
}

.actions{display:flex; align-items:center; justify-content:space-between; margin-top:8px}
.actions .remember{ display:flex; align-items:center; gap:8px; font-size:14px; color:#555 }
.btn{
  border:none; border-radius:12px; padding:10px 14px; background:var(--primary); color:white; font-weight:600;
  box-shadow:var(--shadow-sm);
}
.btn:hover{ background:var(--primary-700) }

.error{
  display:none;
  margin:10px 0 0;
  background:#fee2e2; color:#7f1d1d; border:1px solid #fecaca; border-radius:10px; padding:10px 12px; font-size:14px;
}

/* Footer */
footer{
  padding:20px 16px 28px; color:#777; font-size:13px; display:flex; align-items:center; justify-content:center
}
footer a{text-decoration:underline}
</style>
</head>
<body>

<!-- Main center area -->
<div class="main">
  <div class="card" role="dialog" aria-labelledby="title">
    <div class="card-head">
      <img src="SANSO.jpg" alt="Sanso">
      <div>
        <h1 id="title">Sanso Technical Department</h1>
        <p>შესვლა პორტალში</p>
      </div>
    </div>
    <div class="card-body">
      <div class="form-row">
        <div class="label">მომხმარებელი</div>
        <div class="input">
          <input id="username" type="text" autocomplete="username" placeholder="შეიყვანე მომხმარებელი">
        </div>
      </div>

      <div class="form-row">
        <div class="label">პაროლი</div>
        <div class="input">
          <input id="password" type="password" autocomplete="current-password" placeholder="შეიყვანე პაროლი">
          <button id="togglePasswordBtn" class="suffix-btn" onclick="togglePassword()">აჩვენე</button>
        </div>
      </div>

      <div class="actions">
        <label class="remember">
          <input id="remember" type="checkbox"> დამიმახსოვრე
        </label>
        <button class="btn" onclick="doLogin()">შესვლა</button>
      </div>

      <div id="error" class="error">არასწორი მომხმარებელი ან პაროლი</div>
    </div>
  </div>
</div>

<footer>
  <div>© Sanso • <a href="https://sansotec.ge" target="_blank" rel="noopener">sansotec.ge</a></div>
</footer>

<!-- DATA STORE (server-backed) -->
<script src="/js/data-store.js"></script>

<!-- LOGIN LOGIC (no localStorage; only server) -->
<script>
(async () => {
  await DataStore.init();

  // --- Seed appUsers თუ სერვერზე ჯერ ცარიელია ---
  const seed = [
    { username:"admin",  password:"admin",  role:"Admin",      fullName:"ადმინი" },
    { username:"sandro", password:"sandro", role:"Viewer",     fullName:"სანდრო" },
    { username:"giorgi", password:"giorgi", role:"Viewer",     fullName:"გიორგი" },
    { username:"niko",   password:"ნიკო",   role:"Technician", fullName:"ნიკო"   },
    { username:"vaxo",   password:"vaxo",   role:"Technician", fullName:"ვახო"   }
  ];

  let appUsers = await DataStore.getAppUsers();
  if (!Array.isArray(appUsers) || appUsers.length === 0) {
    await DataStore.saveAppUsers(seed);
    appUsers = seed;
  }

  // პაროლის ჩვენება/დამალვა (არსებულ დიზაინზე ზემოქმედების გარეშე)
  window.togglePassword = function(){
    const ip = document.getElementById("password");
    const btn = document.getElementById("togglePasswordBtn");
    if (!ip || !btn) return;
    if (ip.type === "password"){ ip.type = "text"; btn.textContent = "დამალე"; }
    else { ip.type = "password"; btn.textContent = "აჩვენე"; }
  };

  // Enter ღილაკზე ლოგინი
  document.addEventListener('keydown', (e)=>{ if(e.key==='Enter') doLogin(); });

  // --- ავტორიზაცია (მხოლოდ სერვერზე არსებული appUsers) ---
  window.doLogin = async function(){
    const u = document.getElementById("username")?.value?.trim() || "";
    const p = document.getElementById("password")?.value || "";
    const remember = document.getElementById("remember")?.checked || false;
    const err = document.getElementById("error");

    const list = await DataStore.getAppUsers();
    const found = list.find(x => x.username === u && x.password === p);
    if (!found){ if(err) err.style.display='block'; return; }

    DataStore.setCurrentUser({
      username: found.username,
      role: found.role,
      fullName: found.fullName || found.username,
      loginAt: new Date().toISOString(),
      remember
    });

    // ლოგი (სერვერზე ინახება)
    const logs = await DataStore.getLogs();
    logs.unshift({ user: found.username, action:"Login", time:new Date().toLocaleString("ka-GE") });
    await DataStore.saveLogs(logs);

    window.location.href = "main.html";
  };
})();
</script>

</body>
</html>
