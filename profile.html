<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>პროფილი</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  margin:0; padding:0;
  font-family:"Myriad Pro","Segoe UI",Arial,sans-serif;
  display:flex;
  background:#f4f6f9; color:#282828;
}
/* Sidebar */
.sidebar {
  width:200px;
  background:#282828;
  color:#fff;
  min-height:100vh;
  display:flex; flex-direction:column;
}
.sidebar .brand {
  display:flex; align-items:center; gap:10px;
  padding:14px 16px; border-bottom:1px solid rgba(255,255,255,.1);
}
.sidebar .brand img{ width:40px; height:40px; object-fit:cover; border-radius:8px; }
.sidebar .brand .t1{ font-weight:700; }
.sidebar .brand .t2{ opacity:.8; font-size:12px; }
.sidebar a {
  color:#fff; text-decoration:none; padding:12px 16px; display:block;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.sidebar a:hover{ background:rgba(255,255,255,.08); }
.sidebar .spacer{ flex:1; }
.sidebar .logout{ background:#111; }

/* Main */
.main { flex:1; display:flex; flex-direction:column; gap:14px; }
header {
  background:#fff; border-bottom:1px solid #eee; padding:12px 16px;
  display:flex; align-items:center; justify-content:space-between;
}
header .left{ display:flex; align-items:center; gap:10px; }
header .title{ font-weight:700; }
.container{ padding:16px; display:grid; gap:16px; grid-template-columns: 1fr; }

/* Card */
.card{ background:#fff; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
.card-head{ padding:12px 16px; background:#282828; color:#fff; display:flex; align-items:center; justify-content:space-between; }
.card-body{ padding:16px; }
.form{ display:grid; gap:12px; max-width:520px; }
.form label{ font-size:13px; color:#444; display:block; margin-bottom:6px; }
.form input, .form select{
  width:100%; border:1px solid #ddd; border-radius:10px; padding:8px 10px; outline:none;
}
.actions{ display:flex; gap:10px; margin-top:10px; }
.btn{ background:#282828; color:#fff; border:none; padding:8px 12px; border-radius:10px; cursor:pointer; }
.btn:hover{ background:#1f1f1f; }
</style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="brand">
    <img src="SANSO.jpg" alt="Sanso">
    <div>
      <div class="t1">Sanso Technical</div>
      <div class="t2">Service Portal</div>
    </div>
  </div>
  <a href="main.html">მთავარი</a>
  <a id="settingsLink" href="settings.html" style="display:none">პარამეტრები</a>
  <a id="profileLink" href="profile.html">პროფილი</a>
  <div class="spacer"></div>
  <a class="logout" href="javascript:void(0)" onclick="logout()">გასვლა</a>
</nav>

<!-- Main -->
<div class="main">
  <header>
    <div class="left">
      <div class="title">პროფილის რედაქტირება</div>
      <span class="badge" id="badgeUser" style="background:#111;color:#fff;border-radius:10px;padding:6px 10px; font-size:13px">—</span>
      <span class="badge" id="badgeRole" style="background:#111;color:#fff;border-radius:10px;padding:6px 10px; font-size:13px">—</span>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <div class="card-head">
        <div>ჩემი პროფილი</div>
      </div>
      <div class="card-body">
        <div class="form">
          <div>
            <label>მომხმარებელი</label>
            <input id="username" type="text" placeholder="username">
          </div>
          <div>
            <label>სახელი და გვარი</label>
            <input id="fullName" type="text" placeholder="სახელი გვარი">
          </div>
          <div>
            <label>როლი</label>
            <select id="role" disabled>
              <option value="Admin">Admin</option>
              <option value="Technician">Technician</option>
              <option value="Viewer">Viewer</option>
            </select>
          </div>
          <div>
            <label>პაროლი</label>
            <input id="password" type="text" placeholder="პაროლი">
          </div>

          <div class="actions">
            <button class="btn" onclick="saveProfile()">შენახვა</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Data Store -->
<script src="/js/data-store.js"></script>

<!-- Page Logic (server-backed; no localStorage) -->
<script>
function getCurrentUser(){ return DataStore.getCurrentUser(); }
function getRole(){ return getCurrentUser()?.role || "Viewer"; }

let appUsers = [];
let originalUsername = null;

(async function init(){
  await DataStore.init();

  const cu = DataStore.getCurrentUser();
  if (!cu){ window.location.href = "login.html"; return; }

  // Admin მომხმარებელი აქ არ შემოვუშვათ (Admin-ს settings.html აქვს)
  if (cu.role === "Admin"){ window.location.href = "settings.html"; return; }

  // Sidebar badges
  document.getElementById("badgeUser").textContent = cu.username;
  document.getElementById("badgeRole").textContent = cu.role;

  // Sidebar visibility
  const settingsLink = document.getElementById("settingsLink");
  const profileLink = document.getElementById("profileLink");
  if (settingsLink && profileLink){
    settingsLink.style.display = "none";
    profileLink.style.display = "block";
  }

  appUsers = await DataStore.getAppUsers();
  originalUsername = cu.username;
  loadForm();
})();

function loadForm(){
  const u = appUsers.find(x => x.username === originalUsername);
  if (!u) return;
  document.getElementById("username").value = u.username || "";
  document.getElementById("fullName").value = u.fullName || "";
  document.getElementById("role").value = u.role || "Viewer";
  document.getElementById("password").value = u.password || "";
}

async function saveProfile(){
  const idx = appUsers.findIndex(x => x.username === originalUsername);
  if (idx < 0) return;

  const updated = {
    ...appUsers[idx],
    username: document.getElementById("username").value.trim() || appUsers[idx].username,
    fullName: document.getElementById("fullName").value.trim() || appUsers[idx].fullName,
    role:     appUsers[idx].role, // როლის შეცვლას პროფილიდან არ ვუშვებთ
    password: document.getElementById("password").value
  };

  appUsers[idx] = updated;
  await DataStore.saveAppUsers(appUsers);

  // ლოგი
  const logs = await DataStore.getLogs();
  logs.unshift({ user: originalUsername, action:"ProfileUpdate", time: new Date().toLocaleString("ka-GE") });
  await DataStore.saveLogs(logs);

  // თუ იუზერნეიმი შეიცვალა, სესიის იუზერიც განვაახლოთ
  const cu = DataStore.getCurrentUser();
  if (cu && updated.username !== cu.username) {
    DataStore.setCurrentUser({ ...cu, username: updated.username, fullName: updated.fullName });
    originalUsername = updated.username;
    document.getElementById("badgeUser").textContent = updated.username;
  }

  alert("პროფილი განახლდა.");
}

async function logout(){
  const cu = DataStore.getCurrentUser();
  if(cu){
    const logs = await DataStore.getLogs();
    logs.unshift({ user:cu.username, action:"Logout", time:new Date().toLocaleString("ka-GE") });
    await DataStore.saveLogs(logs);
  }
  DataStore.clearCurrentUser();
  window.location.href = "login.html";
}
</script>

</body>
</html>
