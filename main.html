<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>მთავარი გვერდი</title>
<style>
body {
  margin:0; padding:0;
  font-family:"Myriad Pro","Segoe UI",Arial,sans-serif;
  display:flex;
  background:#f4f6f9; color:#282828;
}
/* Sidebar */
.sidebar {
  width:200px;
  background:#282828;
  color:#fff;
  min-height:100vh;
  display:flex; flex-direction:column;
}
.sidebar .brand {
  display:flex; align-items:center; gap:10px;
  padding:14px 16px; border-bottom:1px solid rgba(255,255,255,.1);
}
.sidebar .brand img{ width:40px; height:40px; object-fit:cover; border-radius:8px; }
.sidebar .brand .t1{ font-weight:700; }
.sidebar .brand .t2{ opacity:.8; font-size:12px; }
.sidebar a {
  color:#fff; text-decoration:none; padding:12px 16px; display:block;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.sidebar a:hover{ background:rgba(255,255,255,.08); }
.sidebar .spacer{ flex:1; }
.sidebar .logout{ background:#111; }

.main {
  flex:1; display:flex; flex-direction:column; gap:14px;
}

header {
  background:#fff; border-bottom:1px solid #eee; padding:12px 16px;
  display:flex; align-items:center; justify-content:space-between;
}
header .left{ display:flex; align-items:center; gap:10px; }
header .title{ font-weight:700; }
header .search{ display:flex; align-items:center; gap:8px; }
header .search input{
  border:1px solid #ddd; border-radius:10px; padding:8px 10px; outline:none;
}
header .cta{
  display:flex; align-items:center; gap:10px;
}
.btn{ background:#282828; color:#fff; border:none; padding:8px 12px; border-radius:10px; cursor:pointer; }
.btn:hover{ background:#1f1f1f; }
.btn-small{ padding:6px 10px; border-radius:8px; border:none; cursor:pointer; }
.btn-edit{ background:#0ea5e9; color:#fff; }
.btn-delete{ background:#ef4444; color:#fff; }
.badge { background:#111; color:#fff; border-radius:10px; padding:6px 10px; font-size:13px; }

.container{
  padding:16px;
  display:grid; gap:16px;
  grid-template-columns: 1fr;
}

.card{
  background:var(--surface);
  border-radius:var(--r);
  box-shadow:var(--shadow-lg);
  position:relative;
  overflow:hidden;
}

.card-head{
  background:#282828;
  color:#fff;
  padding:12px 20px 20px;
  display:flex; align-items:center; justify-content:space-between;
}
.card-head .t{ font-weight:700; }
.card-body{ background:#fff; padding:14px; border:1px solid #eee; border-top:none; }

.table-wrap{ overflow:auto; border:1px solid #eee; border-radius:10px; }
table{ border-collapse:collapse; width:100%; background:#fff; }
th, td{ border-bottom:1px solid #eee; padding:10px 12px; text-align:left; }
tr:hover{ background:#fafafa; }
.actionsCell{ display:flex; gap:6px; }

.modal {
  position:fixed; inset:0; background:rgba(0,0,0,.45); display:none;
  align-items:center; justify-content:center; padding:16px;
}
.modal .dialog{
  width:min(780px, 94vw); background:#fff; border-radius:14px;
  box-shadow:0 20px 50px rgba(0,0,0,.3); overflow:hidden;
}
.modal .dialog header{ display:flex; align-items:center; justify-content:space-between; }
.modal .dialog .body{ padding:16px; }
.modal .dialog .row{ display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:10px; }
.modal .dialog .row label{ font-size:13px; color:#444; display:block; margin-bottom:6px; }
.modal .dialog input{
  width:100%; border:1px solid #ddd; border-radius:10px; padding:8px 10px; outline:none;
}
.modal .dialog footer{ display:flex; gap:8px; justify-content:flex-end; padding:12px 16px; border-top:1px solid #eee; }
</style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="brand">
    <img src="SANSO.jpg" alt="Sanso">
    <div>
      <div class="t1">Sanso Technical</div>
      <div class="t2">Service Portal</div>
    </div>
  </div>
  <a href="main.html">მთავარი</a>
  <a id="settingsLink" href="settings.html">პარამეტრები</a>
  <a id="profileLink" href="profile.html" style="display:none">პროფილი</a>
  <div class="spacer"></div>
  <a class="logout" href="javascript:void(0)" onclick="logout()">გასვლა</a>
</nav>

<!-- Main -->
<div class="main">
  <header>
    <div class="left">
      <div class="title">მომხმარებლები</div>
      <span class="badge" id="thisMonthBadge">—</span>
      <span class="badge" id="thisMonthRevenue">—</span>
    </div>
    <div class="search">
      <input id="searchInput" type="text" placeholder="ძებნა ID ან სახელით..." oninput="searchTable()">
      <div class="cta">
        <button id="addUserBtn" class="btn" onclick="openUserForm()">დამატება</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <div class="card-head">
        <div class="t">დაფიქსირებული მომხმარებლები</div>
      </div>
      <div class="card-body">
        <div class="table-wrap">
          <table id="userTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>დასახელება</th>
                <th>მოწყობილობა</th>
                <th>ტელეფონი</th>
                <th>ქმედება</th>
              </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal: დამატება/რედაქტირება -->
<div class="modal" id="userModal">
  <div class="dialog">
    <header>
      <div class="title" id="modalTitle">მომხმარებლის დამატება</div>
      <button class="btn-small" onclick="closeUserForm()">×</button>
    </header>
    <div class="body">
      <div class="row">
        <div>
          <label>ID</label>
          <input id="userId" type="text" placeholder="მაგ: C-001">
        </div>
        <div>
          <label>დასახელება</label>
          <input id="userName" type="text" placeholder="კომპანიის სახელი">
        </div>
      </div>
      <div class="row">
        <div>
          <label>კოდი</label>
          <input id="userCode" type="text">
        </div>
        <div>
          <label>მისამართი</label>
          <input id="userAddress" type="text">
        </div>
      </div>
      <div class="row">
        <div>
          <label>ტელეფონი</label>
          <input id="userPhone" type="text">
        </div>
        <div>
          <label>კონტაქტი</label>
          <input id="userContact" type="text">
        </div>
      </div>

      <div class="row">
        <div>
          <label>მოწყობილობა</label>
          <input id="deviceModel" type="text" placeholder="მაგ: Epson TM-T20">
        </div>
        <div>
          <label>სერიალი</label>
          <input id="deviceSerial" type="text" placeholder="მაგ: X1A2B3">
        </div>
      </div>
    </div>
    <footer>
      <button class="btn-small" onclick="closeUserForm()">დახურვა</button>
      <button class="btn-small btn-edit" onclick="saveUser()">შენახვა</button>
    </footer>
  </div>
</div>

<!-- Server-backed data store -->
<script src="/js/data-store.js"></script>

<!-- Main logic (server only; no localStorage) -->
<script>
/* ===== Guard & Role helpers (sessionStorage via DataStore) ===== */
function getCurrentUser(){ return DataStore.getCurrentUser(); }
function getRole(){ return getCurrentUser()?.role || "Viewer"; }
function isAdmin(){ return getRole()==="Admin"; }
function isTech(){ return getRole()==="Technician"; }
function isViewer(){ return getRole()==="Viewer"; }

(async function(){
  await DataStore.init();
  const cu = DataStore.getCurrentUser();
  if(!cu){ window.location.href = "login.html"; return; }

  // ===== State =====
  let users = await DataStore.getUsers();
  let editingIndex = null;

  function normalizeDevicesToSingle() {
    let changed = false;
    users.forEach(u=>{
      if (Array.isArray(u.devices)) {
        if (u.devices.length > 0) {
          let first = u.devices[0];
          if (typeof first === "string") {
            u.devices = [{ model: first, serial: "" }];
            changed = true;
          } else if (first && typeof first === "object") {
            u.devices = [{ model: first.model || "", serial: (first.serial || "").trim() }];
            changed = true;
          } else {
            u.devices = [];
          }
        } else {
          u.devices = [];
        }
      }
    });
    if (changed) { DataStore.saveUsers(users).catch(()=>{}); }
  }
  normalizeDevicesToSingle();

  function deviceDisplayOne(u){
    if (!u.devices || !u.devices.length) return "";
    const d = u.devices[0];
    const model = (d.model || "").trim();
    const serial = (d.serial || "").trim();
    return [model, serial].filter(Boolean).join(" / ");
  }

  const MONTHS_KA = ["იანვარი","თებერვალი","მარტი","აპრილი","მაისი","ივნისი","ივლისი","აგვისტო","სექტემბერი","სექტემბერი","ოქტომბერი","ნოემბერი","დეკემბერი"];

  function renderUsers(){
    const tbody = document.getElementById("userTableBody");
    if(!tbody) return;
    tbody.innerHTML = "";
    users.forEach((u, index) => {
      const row = document.createElement("tr");
      const deviceText = deviceDisplayOne(u) || "";
      row.onclick = function() { openUserPage(u.id); };

      let actionHtml = "";
      if (!isViewer()) {
        actionHtml = `
          <button class="btn-small btn-edit" onclick="event.stopPropagation(); editUser(${index})">რედაქტირება</button>
          <button class="btn-small btn-delete" onclick="event.stopPropagation(); deleteUser(${index})">წაშლა</button>
        `;
      }

      row.innerHTML = `
        <td>${u.id ?? ""}</td>
        <td>${u.name ?? ""}</td>
        <td>${deviceText}</td>
        <td>${u.phone || ""}</td>
        <td class="actionsCell">${actionHtml}</td>`;
      tbody.appendChild(row);
    });

    updateThisMonthBadgeAndRevenue();
    updateUIByRole();
  }

  function updateThisMonthBadgeAndRevenue(){
    const now = new Date();
    const currentMonth = now.getMonth();
    const currentYear = now.getFullYear();
    const monthName = MONTHS_KA[currentMonth];

    let count = 0;
    let revenue = 0;

    users.forEach(u=>{
      if(Array.isArray(u.services)){
        u.services.forEach(s=>{
          const dt = s.date ? new Date(s.date) : null;
          if (dt && dt.getMonth()===currentMonth && dt.getFullYear()===currentYear) {
            count++;
            const price = Number(s.price || 0);
            if(!isNaN(price)) revenue += price;
          }
        });
      }
    });

    const badge = document.getElementById("thisMonthBadge");
    if (badge) badge.textContent = `${monthName}: ${count}`;

    const rev = document.getElementById("thisMonthRevenue");
    if (rev) rev.textContent = `${revenue.toLocaleString('ka-GE')} ₾`;
  }

  function updateUIByRole(){
    const addBtn = document.getElementById("addUserBtn");
    if (addBtn) addBtn.style.display = isViewer() ? "none" : "inline-block";
    const settingsLink = document.getElementById("settingsLink");
    const profileLink = document.getElementById("profileLink");
    if (settingsLink && profileLink){
      if (isTech() || isViewer()) { settingsLink.style.display="none"; profileLink.style.display="block"; }
      else if (isAdmin()) { settingsLink.style.display="block"; profileLink.style.display="none"; }
    }
  }

  window.openUserForm = function() {
    if (isViewer()) { alert("დაშვება მხოლოდ Admin/Technician როლებისთვის."); return; }
    editingIndex = null;
    document.getElementById("modalTitle").innerText = "მომხმარებლის დამატება";
    document.getElementById("userId").value = "";
    document.getElementById("userName").value = "";
    document.getElementById("userCode").value = "";
    document.getElementById("userAddress").value = "";
    document.getElementById("userPhone").value = "";
    document.getElementById("userContact").value = "";
    document.getElementById("deviceModel").value = "";
    document.getElementById("deviceSerial").value = "";
    document.getElementById("userModal").style.display = "block";
  };

  window.saveUser = async function() {
    if (isViewer()) { alert("დაშვება მხოლოდ Admin/Technician როლებისთვის."); return; }
    const id = document.getElementById("userId").value;
    const name = document.getElementById("userName").value;
    const code = document.getElementById("userCode").value;
    const address = document.getElementById("userAddress").value;
    const phone = document.getElementById("userPhone").value;
    const contact = document.getElementById("userContact").value;
    const devices = collectDeviceFromForm();

    if (!id || !name) { alert("გთხოვთ შეავსოთ სავალდებულო ველები (ID და დასახელება)"); return; }

    const existingServices = (editingIndex!==null && users[editingIndex]?.services) ? users[editingIndex].services : [];
    const userData = { id, name, code, address, phone, contact, devices, services: existingServices };

    if (editingIndex !== null) {
      users[editingIndex] = userData;
    } else {
      users.push(userData);
    }

    await DataStore.saveUsers(users);
    renderUsers();
    closeUserForm();
  };

  window.editUser = function(index) {
    if (isViewer()) { alert("დაშვება მხოლოდ Admin/Technician როლებისთვის."); return; }
    editingIndex = index;
    const u = users[index];
    document.getElementById("modalTitle").innerText = "მომხმარებლის რედაქტირება";
    document.getElementById("userId").value = u.id || "";
    document.getElementById("userName").value = u.name || "";
    document.getElementById("userCode").value = u.code || "";
    document.getElementById("userAddress").value = u.address || "";
    document.getElementById("userPhone").value = u.phone || "";
    document.getElementById("userContact").value = u.contact || "";
    if (u.devices && u.devices[0]){
      document.getElementById("deviceModel").value = u.devices[0].model || "";
      document.getElementById("deviceSerial").value = u.devices[0].serial || "";
    } else {
      document.getElementById("deviceModel").value = "";
      document.getElementById("deviceSerial").value = "";
    }
    document.getElementById("userModal").style.display = "block";
  };

  window.deleteUser = async function(index) {
    if (isViewer()) { alert("დაშვება მხოლოდ Admin/Technician როლებისთვის."); return; }
    if (!confirm("ნამდვილად გსურთ წაშლა?")) return;
    users.splice(index, 1);
    await DataStore.saveUsers(users);
    renderUsers();
  };

  function collectDeviceFromForm(){
    const model = (document.getElementById("deviceModel")?.value || "").trim();
    const serial = (document.getElementById("deviceSerial")?.value || "").trim();
    const arr = [];
    if (model || serial) arr.push({ model, serial });
    return arr;
  }

  window.closeUserForm = function(){
    const m = document.getElementById("userModal");
    if (m) m.style.display = "none";
  };

  window.openUserPage = function(id) {
    DataStore.setSelectedUser(id);
    window.location.href = "user.html";
  };

  window.searchTable = function() {
    let input = (document.getElementById("searchInput")?.value || "").toLowerCase();
    let rows = document.getElementById("userTable")?.getElementsByTagName("tr") || [];
    for (let i = 1; i < rows.length; i++) {
      let row = rows[i];
      let idCell = row.cells[0]?.textContent.toLowerCase() || "";
      let nameCell = row.cells[1]?.textContent.toLowerCase() || "";
      row.style.display = (idCell.includes(input) || nameCell.includes(input)) ? "" : "none";
    }
  };

  window.logout = async function(){
    const cu = DataStore.getCurrentUser();
    if(cu){
      const logs = await DataStore.getLogs();
      logs.unshift({ user:cu.username, action:"Logout", time:new Date().toLocaleString("ka-GE") });
      await DataStore.saveLogs(logs);
    }
    DataStore.clearCurrentUser();
    window.location.href="login.html";
  };

  renderUsers();
})();
</script>

</body>
</html>
