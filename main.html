<style>
body {
  margin:0; padding:0;
  font-family:"Myriad Pro","Segoe UI",Arial,sans-serif;
  display:flex;
  background:#f4f6f9; color:#282828;
}
/* Sidebar */
.sidebar {
  width:200px;
  background:#282828;
  color:white;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.sidebar img {
  width:100px;
  margin:20px 0;

}
.sidebar a {
  color:white;
  text-decoration:none;
  padding:12px 16px;
  font-size:14px;
  width:100%;
  display:block;
  text-align:left;
  border-bottom:1px solid rgba(255,255,255,0.08);
  transition:background .2s;
}
.sidebar a:hover { background:rgba(255,255,255,0.12); }
.sidebar a.active { background:rgba(255,255,255,0.25); }

/* Content wrapper */
.content {
  flex:1;
  display:flex;
  flex-direction:column;
}

/* Top Banner */
.topbar {
  background:#282828;

  padding:14px 20px;

  align-items:center;
  justify-content:space-between;
}
.topbar .title {
  font-size:18px;
  font-weight:bold;
}
.topbar .badges {
  display:flex;
  gap:12px;
}
.topbar .badge {
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.35);
  padding:6px 10px;
  border-radius:8px;
  font-size:13px;
}

/* Container */
.container { width:90%; max-width:1200px; margin:20px auto; }
.actions { display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;}
.actions button { padding:10px 15px; border:none; background:#282828; color:white; border-radius:6px; cursor:pointer;}
.actions button:hover { background:#1f1f1f;}
#searchInput { padding:8px; width:300px; border-radius:5px; border:1px solid #cfcfcf; color:#282828;}
table { width:100%; border-collapse:collapse; background:white; border-radius:10px; overflow:hidden; box-shadow:0 2px 6px rgba(0,0,0,0.1);}
table th, table td { padding:12px; text-align:left; border-bottom:1px solid #e7e7e7; font-size:14px;}
table th { background:#efefef; color:#222;}
tr:hover { background:#f7f7f7; cursor:pointer;}
.btn-small { padding:5px 10px; border:none; border-radius:5px; cursor:pointer; font-size:13px; }
.btn-edit { background:#b58900; color:white;}
.btn-delete { background:#b00020; color:white;}
.btn-edit:hover { filter:brightness(0.95);}
.btn-delete:hover { filter:brightness(0.95); }

/* Popup */
.modal { display:none; position:fixed; z-index:999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5);}
.modal-content { background:white; margin:5% auto; padding:24px; border-radius:10px; width:560px; max-width:92%; position:relative; box-shadow:0 5px 15px rgba(0,0,0,0.3);}
.modal-content h3 { text-align:center; margin-top:0; color:#282828;}
.modal-content label { display:block; margin-top:12px; }
.modal-content input, .modal-content select { width:100%; padding:10px; margin-top:6px; margin-bottom:6px; border-radius:6px; border:1px solid #ccc; color:#282828; box-sizing:border-box;}
.modal-content button { margin-top:16px; width:100%; padding:12px; background:#282828; color:white; border:none; border-radius:8px; cursor:pointer;}
.modal-content button:hover { background:#1f1f1f;}
.close { position:absolute; right:15px; top:10px; font-size:22px; font-weight:bold; color:#333; cursor:pointer;}

.deviceRow { display:flex; gap:10px; align-items:center; margin-top:8px; }
.deviceRow select { flex: 0 0 60%; }
.deviceRow input.deviceSerial { flex: 1; }
.hint { font-size:12px; color:#666; margin-top:4px;}
</style>
</head>

<script>
  // ახალ ვერსიაში ვაკეთებთ *ფუნქციას* (არა IIFE-ს), რათა სხვა კოდმა შეძლოს "await"-ით დალოდება
  window.bootstrapFromServerIfEmpty = async function () {
    try {
      const cur = JSON.parse(localStorage.getItem('users') || '[]');
      if (!Array.isArray(cur) || cur.length === 0) {
        const r = await fetch('https://restless-lab-c6ef.n-gogolashvili.workers.dev/get-users');
        const j = await r.json();
        if (Array.isArray(j?.users) && j.users.length > 0) {
          localStorage.setItem('users', JSON.stringify(j.users));
        }
      }
    } catch (e) {
      console.warn('bootstrapFromServerIfEmpty:', e);
    }
  };
</script>


<script>

/* ===== Role helpers ===== */
function getRole(){
  const cu = JSON.parse(localStorage.getItem("currentUser")||"null");
  return cu?.role || "Viewer";
}
function isAdmin(){ return getRole()==="Admin"; }
function isTech(){ return getRole()==="Technician"; }
function isViewer(){ return getRole()==="Viewer"; }

/* ===== Helpers ===== */
const MONTHS_KA = ["იანვარი","თებერვალი","მარტი","აპრილი","მაისი","ივნისი","ივლისი","აგვისტო","სექტემბერი","ოქტომბერი","ნოემბერი","დეკემბერი"];

let users = JSON.parse(localStorage.getItem("users")) || [];
let editingIndex = null;

function normalizeDevicesToSingle() {
  let changed = false;
  users.forEach(u=>{
    if (Array.isArray(u.devices)) {
      if (u.devices.length > 0) {
        let first = u.devices[0];
        if (typeof first === "string") {
          u.devices = [{ model: first, serial: "" }];
          changed = true;
        } else if (first && typeof first === "object") {
          u.devices = [{ model: first.model || "", serial: (first.serial || "").trim() }];
          changed = true;
        } else {
          u.devices = [];
        }
      } else {
        u.devices = [];
      }
    }
  });
  if (changed) localStorage.setItem("users", JSON.stringify(users));
}
normalizeDevicesToSingle();
// --- NEW: explicit “push now” helper; does NOT change UI/UX ---
async function syncUsersToServer() {
  try {
    const cur = JSON.parse(localStorage.getItem('users') || '[]');
    if (Array.isArray(cur) && window.ServerStore && ServerStore.saveUsers) {
      await ServerStore.saveUsers(cur);
    }
  } catch (e) { /* silent */ }
}

function deviceDisplayOne(u){
  if (!u.devices || !u.devices.length) return "";
  const d = u.devices[0];
  if (typeof d === "object") {
    const m = d.model || "";
    const s = (d.serial || "").trim();
    return s ? `${m} | ${s}` : m;
  }
  return d || "";
}

function renderUsers() {
  const tbody = document.getElementById("userTable").tBodies[0];
  tbody.innerHTML = "";
  users.forEach((u, index) => {
    let deviceText = deviceDisplayOne(u);
    let row = tbody.insertRow();

    row.onclick = function() { openUserPage(u.id); };

    let actionHtml = "";
    if (!isViewer()) {
      actionHtml = `
        <button class="btn-small btn-edit" onclick="event.stopPropagation(); editUser(${index})">რედაქტირება</button>
        <button class="btn-small btn-delete" onclick="event.stopPropagation(); deleteUser(${index})">წაშლა</button>
      `;
    }

    row.innerHTML = `
      <td>${u.id}</td>
      <td>${u.name}</td>
      <td>${deviceText}</td>
      <td>${u.phone || ""}</td>
      <td class="actionsCell">${actionHtml}</td>`;
  });

  updateThisMonthBadgeAndRevenue();
  updateUIByRole();
}

function updateThisMonthBadgeAndRevenue(){
  const now = new Date();
  const currentMonth = now.getMonth();
  const currentYear = now.getFullYear();
  const monthName = MONTHS_KA[currentMonth];

  let count = 0;
  let revenue = 0;

  users.forEach(u=>{
    (u.services || []).forEach(s=>{
      if (s.date && typeof s.date === "string") {
        let d;
        if (s.date.includes("-")) { 
          d = new Date(s.date); 
        } else if (s.date.includes(".")) {
          let parts = s.date.split(".");
          if (parts.length === 3) {
            let day = parseInt(parts[0], 10);
            let month = parseInt(parts[1], 10) - 1; 
            let year = parseInt(parts[2], 10);
            d = new Date(year, month, day);
          }
        }

        if (d && d.getMonth() === currentMonth && d.getFullYear() === currentYear) {
          count++;
          const rawPrice = String(s.price ?? "");
          const cleaned = rawPrice.replace(/[^\d.,-]/g, "").trim();
          const normalized = cleaned.replace(",", ".");
          const numericPrice = parseFloat(normalized);
          if (!isNaN(numericPrice)) {
            revenue += numericPrice;
          }
        }
      }
    });
  });

  document.getElementById("thisMonthVisitsLabel").textContent = `${monthName}:`;
  document.getElementById("thisMonthVisits").textContent = count;

  const revenueBadge = document.getElementById("revenueBadge");
  if (isAdmin() || isViewer()) {
    revenueBadge.style.display = "block";
    document.getElementById("thisMonthRevenueLabel").textContent = `${monthName}:`;
    document.getElementById("thisMonthRevenue").textContent = `${revenue.toFixed(2)}₾`;
  } else {
    revenueBadge.style.display = "none";
  }
}

function updateUIByRole(){
  document.getElementById("addUserBtn").style.display = isViewer() ? "none" : "inline-block";
  const settingsLink = document.getElementById("settingsLink");
  const profileLink = document.getElementById("profileLink"); // ✅ დამატებული

  if (isTech()) {
    settingsLink.style.display = "none";
    profileLink.style.display = "block";    // ✅ პროფილი ჩანს
  } else if (isViewer()) {
    settingsLink.style.display = "none";
    profileLink.style.display = "block";    // ✅ პროფილი ჩანს
  } else if (isAdmin()) {
    settingsLink.style.display = "block";
    profileLink.style.display = "none";     // ✅ ადმინს არ ვაჩვენებთ
  }
}

function openUserForm() {
  if (isViewer()) { alert("დაშვება მხოლოდ Admin/Technician როლებისთვის."); return; }

  editingIndex = null;
  document.getElementById("modalTitle").innerText = "მომხმარებლის დამატება";
  document.getElementById("userId").value = "";
  document.getElementById("userName").value = "";
  document.getElementById("userCode").value = "";
  document.getElementById("userAddress").value = "";
  document.getElementById("userPhone").value = "";
  document.getElementById("userContact").value = "";

  document.getElementById("deviceContainer").innerHTML = `
    <div class="deviceRow">
      <select class="deviceSelect">
        <option>Soprano ICE</option>
        <option>Soprano ICE Platinum</option>
        <option>Soprano Titanium</option>
        <option>Accent Prime</option>
        <option>Prime X</option>
        <option>Harmony</option>
      </select>
      <input class="deviceSerial" type="text" placeholder="აპარატის სერიული ნომერი">
    </div>`;
  document.getElementById("userModal").style.display = "block";
}

function closeUserForm() { document.getElementById("userModal").style.display = "none"; }

function collectDeviceFromForm(){
  const sel = document.querySelector(".deviceSelect");
  const ser = document.querySelector(".deviceSerial");
  return [{ model: sel?.value || "", serial: (ser?.value || "").trim() }];
}

function saveUser() {
  if (isViewer()) { alert("დაშვება მხოლოდ Admin/Technician როლებისთვის."); return; }

  const id = document.getElementById("userId").value;
  const name = document.getElementById("userName").value;
  const code = document.getElementById("userCode").value;
  const address = document.getElementById("userAddress").value;
  const phone = document.getElementById("userPhone").value;
  const contact = document.getElementById("userContact").value;
  const devices = collectDeviceFromForm();

  if (!id || !name) { alert("გთხოვთ შეავსოთ სავალდებულო ველები (ID და დასახელება)"); return; }

  const existingServices = (editingIndex!==null && users[editingIndex]?.services) ? users[editingIndex].services : [];
  const userData = { id, name, code, address, phone, contact, devices, services: existingServices };

  if (editingIndex !== null) {
    users[editingIndex] = userData;
  } else {
    users.push(userData);
  }

  localStorage.setItem("users", JSON.stringify(users));
  
  syncUsersToServer(); // NEW
renderUsers();
  closeUserForm();
}

function editUser(index) {
  if (isViewer()) { alert("დაშვება მხოლოდ Admin/Technician როლებისთვის."); return; }

  editingIndex = index;
  const u = users[index];
  document.getElementById("modalTitle").innerText = "მომხმარებლის რედაქტირება";
  document.getElementById("userId").value = u.id;
  document.getElementById("userName").value = u.name;
  document.getElementById("userCode").value = u.code || "";
  document.getElementById("userAddress").value = u.address || "";
  document.getElementById("userPhone").value = u.phone || "";
  document.getElementById("userContact").value = u.contact || "";

  let model="", serial="";
  if (u.devices && u.devices.length){
    const d = u.devices[0];
    if (typeof d === "object"){ model = d.model || ""; serial = d.serial || ""; }
    else { model = d; }
  }

  document.getElementById("deviceContainer").innerHTML = `
    <div class="deviceRow">
      <select class="deviceSelect">
        <option ${model==="Soprano ICE"?"selected":""}>Soprano ICE</option>
        <option ${model==="Soprano ICE Platinum"?"selected":""}>Soprano ICE Platinum</option>
        <option ${model==="Soprano Titanium"?"selected":""}>Soprano Titanium</option>
        <option ${model==="Accent Prime"?"selected":""}>Accent Prime</option>
        <option ${model==="Prime X"?"selected":""}>Prime X</option>
        <option ${model==="Harmony"?"selected":""}>Harmony</option>
      </select>
      <input class="deviceSerial" type="text" placeholder="აპარატის სერიული ნომერი" value="${serial}">
    </div>`;
  document.getElementById("userModal").style.display = "block";
}

function deleteUser(index) {
  if (isViewer()) { alert("დაშვება მხოლოდ Admin/Technician როლებისთვის."); return; }

  if(confirm("ნამდვილად გსურთ წაშლა?")){
    users.splice(index,1);
    localStorage.setItem("users", JSON.stringify(users));
    
    syncUsersToServer(); // NEW
renderUsers();
  }
}

function openUserPage(id) {
  localStorage.setItem("selectedUser", id);
  window.location.href = "user.html";
}

function searchTable() {
  let input = document.getElementById("searchInput").value.toLowerCase();
  let rows = document.getElementById("userTable").getElementsByTagName("tr");

  for (let i = 1; i < rows.length; i++) {
    let row = rows[i];
    let idCell = row.cells[0]?.textContent.toLowerCase() || "";
    let nameCell = row.cells[1]?.textContent.toLowerCase() || "";
    if (idCell.includes(input) || nameCell.includes(input)) {
      row.style.display = "";
    } else {
      row.style.display = "none";
    }
  }
}

// 🚀 Logout with logging
async function logout() {
  try { await window.ServerAuth?.logout?.(); } catch {}
  try { localStorage.clear(); sessionStorage.clear(); } catch {}
  window.location.href = 'login.html?stay=1'; // ვამბობთ: login-ზე დამტოვე, არ გადამაგდო main-ზე
}
</script>

<script>
  (async function initMain() {
    try {
      // ① ჯერ დაელოდე bootstrap-ს: თუ localStorage ცარიელია, ჩამოიტანს სერვერიდან
      if (typeof window.bootstrapFromServerIfEmpty === 'function') {
        await window.bootstrapFromServerIfEmpty();
      }

      // ② ამის შემდეგ წაიკითხე users ლოკალიდან და დაანორმალე
      users = JSON.parse(localStorage.getItem('users') || '[]');
      normalizeDevicesToSingle();

      // ③ თუ მაინც ცარიელია და გაქვს ServerStore.getUsers, სცადე პირდაპირი წამოღება ერთხელ
      if ((!Array.isArray(users) || users.length === 0) && window.ServerStore && ServerStore.getUsers) {
        try {
          const remote = await ServerStore.getUsers();
          if (Array.isArray(remote) && remote.length > 0) {
            localStorage.setItem('users', JSON.stringify(remote));
            users = remote;
            normalizeDevicesToSingle();
          }
        } catch {}
      }
    } catch (e) {
      console.warn('initMain bootstrap error:', e);
    }

    // ④ ახლა უკვე დახატე ცხრილი (პირველივე გახსნაზეც სავსე იქნება)
    renderUsers();

    // ⑤ მომავალ ცვლილებებზე სერვერზე პუში (debounce)
    const _set = localStorage.setItem.bind(localStorage);
    localStorage.setItem = function (k, v) {
      _set(k, v);
      if (k === 'users' && window.ServerStore && ServerStore.saveUsers) {
        clearTimeout(localStorage.__usersPushT);
        localStorage.__usersPushT = setTimeout(async () => {
          try {
            const cur = JSON.parse(localStorage.getItem('users') || '[]');
            await ServerStore.saveUsers(cur);
          } catch (e) {}
        }, 250);
      }
    };
  })();
</script>

<script>
// --- კლიენტების ნორმალიზაცია (უსაფრთხოდ გაწმენდილი ველები) ---
function normalizeCustomer(raw = {}) {
  const u = { ...raw };
  // სახელის ალტერნატივები
  if (!u.fullName) u.fullName = u.name || u.title || "";
  // მომხმარებლის სახელი (თუ გაქვს ცალკე)
  if (!u.username) u.username = u.user || u.login || "";
  // ელფოსტა/ტელეფონი თუ არსებობს
  if (!u.email)  u.email  = u.mail || u.emailAddress || "";
  if (!u.phone)  u.phone  = u.tel || u.mobile || "";
  // სტატუსი ფეხზე დადგეს ბულეთად
  if (typeof u.disabled !== "boolean") u.disabled = !!u.isDisabled;

  return {
    fullName: String(u.fullName || "").trim(),
    username: String(u.username || "").trim(),
    email:    String(u.email || "").trim(),
    phone:    String(u.phone || "").trim(),
    disabled: !!u.disabled,
    // სხვა ველები თუ გჭირდება, დაამატე აქვე (address, object, note...)
  };
}
function normalizeCustomers(arr){
  return Array.isArray(arr) ? arr.map(normalizeCustomer).filter(x => x.fullName || x.username) : [];
}

// --- აქ შეინახება კლიენტების სია, რასაც UI იყენებს ---
let customers = [];

(async function loadCustomersForMain(){
  try {
    // 0) სესია გადავამოწმოთ
    const s = await (window.ServerAuth?.me?.() ?? Promise.resolve({authenticated:false}));
    if (!s?.authenticated) {
      try { localStorage.removeItem('currentUser'); } catch {}
      location.replace('login.html?stay=1');
      return;
    }

    // 1) ამოღება სერვერიდან: ეს არის **კლიენტების** სია, არა appUsers
    const usersSrv = await (window.ServerStore?.getUsers?.() ?? Promise.resolve([]));
    customers = normalizeCustomers(usersSrv);

    // 2) cache ლოკალში (არ არის authoritative, უბრალოდ სწრაფი refresh-თვის)
    try { localStorage.setItem('users', JSON.stringify(customers)); } catch {}

    // 3) თუ შენი renderer ელოდება გლობალ `users`-ს:
    window.users = customers;

    // 4) განაახლე ცხრილი
    if (typeof renderUsers === 'function') renderUsers(); // ან renderUsers(customers) თუ ასე გაქვს დაწერილი
  } catch (e) {
    console.error('main: failed to load users from server:', e);
    //fallback — ლოკალური cache მაინც ვცადოთ
    try { customers = normalizeCustomers(JSON.parse(localStorage.getItem('users')||'[]')); } catch { customers = []; }
    window.users = customers;
    if (typeof renderUsers === 'function') renderUsers();
  }
})();

// სხვა ტაბიდან ცვლილებების მოსმენა (თუ settings-იდან გადაიწერა users სია)
window.addEventListener('storage', (ev)=>{
  if (ev.key === 'users') {
    try { customers = normalizeCustomers(JSON.parse(ev.newValue||'[]')); } catch { customers = []; }
    window.users = customers;
    if (typeof renderUsers === 'function') renderUsers();
  }
});
</script>
