<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <title>Sanso Portal</title>

</head>

  <div class="wrap">

      <div>იკვეთება გადასვლა <strong>login.html</strong>-ზე…</div>

    </div>
  </div>

</html>
